services:
  - type: web
    name: travel-planner
    env: node
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
    plan: free